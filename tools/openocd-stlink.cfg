# tools/openocd-stlink.cfg
# OpenOCD配置文件 - ST-Link V2调试STM32F407
# 星火一号开发板板载ST-Link V2.1

# 选择调试接口
source [find interface/stlink.cfg]

# 选择目标芯片
source [find target/stm32f4x.cfg]

# 调试速度 (kHz)
adapter speed 48000

# SWD模式
transport select hla_swd

# 重置配置
reset_config srst_only srst_nogate

# 调试输出
debug_level 2